name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - erc-asset-registry
          - erc-document-bundle-anchor
          - erc-transfer-domain
          - erc-compliance-event-log
          - erc-impact-snapshot
          - erc-nav-oracle

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for contracts
        id: check
        working-directory: packages/${{ matrix.package }}
        run: |
          if ls src/interfaces/*.sol 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: foundry-rs/foundry-toolchain@v1
        if: steps.check.outputs.has_contracts == 'true'
        with:
          version: v1.7.1

      - name: Cache Foundry artifacts
        if: steps.check.outputs.has_contracts == 'true'
        uses: actions/cache@v4
        with:
          path: packages/${{ matrix.package }}/out
          key: foundry-${{ matrix.package }}-${{ hashFiles(format('packages/{0}/src/**/*.sol', matrix.package)) }}
          restore-keys: foundry-${{ matrix.package }}-

      - name: Build & test
        if: steps.check.outputs.has_contracts == 'true'
        working-directory: packages/${{ matrix.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          forge install
          forge build --sizes
          forge test -vvv

      - name: No contracts, skipping
        if: steps.check.outputs.has_contracts == 'false'
        run: echo "No contracts yet, skipping"

  static-analysis:
    name: Slither (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - erc-asset-registry
          - erc-document-bundle-anchor
          - erc-transfer-domain
          - erc-compliance-event-log
          - erc-impact-snapshot
          - erc-nav-oracle

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for contracts
        id: check
        working-directory: packages/${{ matrix.package }}
        run: |
          if ls src/interfaces/*.sol 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: foundry-rs/foundry-toolchain@v1
        if: steps.check.outputs.has_contracts == 'true'
        with:
          version: v1.7.1

      - name: Run Slither
        if: steps.check.outputs.has_contracts == 'true'
        uses: crytic/slither-action@v0.4.0
        with:
          target: packages/${{ matrix.package }}
          fail-on: high

      - name: No contracts, skipping
        if: steps.check.outputs.has_contracts == 'false'
        run: echo "No contracts yet, skipping"

  gas-snapshot:
    name: Gas Snapshot (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - erc-asset-registry
          - erc-document-bundle-anchor
          - erc-transfer-domain
          - erc-compliance-event-log
          - erc-impact-snapshot
          - erc-nav-oracle

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for contracts
        id: check
        working-directory: packages/${{ matrix.package }}
        run: |
          if ls src/interfaces/*.sol 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: foundry-rs/foundry-toolchain@v1
        if: steps.check.outputs.has_contracts == 'true'
        with:
          version: v1.7.1

      - name: Cache Foundry artifacts
        if: steps.check.outputs.has_contracts == 'true'
        uses: actions/cache@v4
        with:
          path: packages/${{ matrix.package }}/out
          key: foundry-${{ matrix.package }}-${{ hashFiles(format('packages/{0}/src/**/*.sol', matrix.package)) }}
          restore-keys: foundry-${{ matrix.package }}-

      - name: Gas snapshot
        if: steps.check.outputs.has_contracts == 'true'
        working-directory: packages/${{ matrix.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          forge install
          forge snapshot

      - name: No contracts, skipping
        if: steps.check.outputs.has_contracts == 'false'
        run: echo "No contracts yet, skipping"

      - name: Upload gas snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot-${{ matrix.package }}
          path: packages/${{ matrix.package }}/.gas-snapshot
          if-no-files-found: ignore

  medusa-fuzz:
    name: Medusa Fuzz (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - erc-document-bundle-anchor
          - erc-transfer-domain
          - erc-compliance-event-log
          - erc-impact-snapshot
          - erc-nav-oracle

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Install Medusa
        run: |
          set -euo pipefail

          RELEASE_JSON=$(curl -fsSL https://api.github.com/repos/crytic/medusa/releases/latest)
          MEDUSA_URL=$(echo "$RELEASE_JSON" | grep browser_download_url | cut -d '"' -f 4 | grep -Ei 'linux.*(amd64|x64|x86_64).*\.tar\.gz$' | head -n 1 || true)

          if [ -z "${MEDUSA_URL:-}" ]; then
            echo "No suitable Linux Medusa tarball found in latest release assets."
            exit 1
          fi

          curl -fsSL "$MEDUSA_URL" | tar -xz
          sudo install -m 0755 medusa /usr/local/bin/medusa
          medusa --version
          python3 -m pip install --upgrade pip
          python3 -m pip install crytic-compile

      - name: Build contracts
        working-directory: packages/${{ matrix.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: forge install && forge build

      - name: Run Medusa invariant fuzzing
        working-directory: packages/${{ matrix.package }}
        run: medusa fuzz --timeout 120
