name: PR Notifications

on:
  pull_request:
    types: [review_requested, closed]
  pull_request_review:
    types: [submitted]
  schedule:
    # Hourly sweep that posts 12h / 24h reminders in the Slack thread
    # for any PR still awaiting review. Cron runs in UTC.
    # Off-peak minute (`:17`) reduces drop/delay risk vs `:00`. See:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '17 * * * *'

permissions:
  pull-requests: write
  issues: write

jobs:
  notify:
    if: github.event_name != 'schedule'
    uses: KulaDao/.github/.github/workflows/pr_r4r_slack_notifier.yml@main
    secrets: inherit

  remind:
    if: github.event_name == 'schedule'
    uses: KulaDao/.github/.github/workflows/pr_r4r_reminders.yml@main
    secrets: inherit
